# Place this file at .github/workflows/ci.yml in your Next.js repo
name: Build and Ship

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  REMOTE_PATH: /home/appuser/server/sites/blog

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          # Copy everything needed to build the Docker image on the server
          cp Dockerfile package.json package-lock.json next.config.mjs tsconfig.json artifacts/
          cp -r app components lib public styles artifacts/

      - name: Ship to server
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: appuser
          SOURCE: "artifacts/"
          TARGET: ${{ env.REMOTE_PATH }}
          ARGS: "-rlgoDzvc --delete"

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/server
            docker compose up -d --build --force-recreate app
